<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Étudiant</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          margin: 2rem;
          background-color: #f9f9f9;
        }
        h2 {
          color: #333;
        }
        form {
          background-color: #fff;
          padding: 1rem 2rem;
          border: 1px solid #ccc;
          max-width: 500px;
          margin: auto;
        }
        input, button {
          width: 100%;
          padding: 0.5rem;
          margin: 0.5rem 0;
          font-size: 1rem;
        }
        button {
          background-color: #ff001e;
          color: #fff;
          border: none;
          cursor: pointer;
        }
        button:hover {
          background-color: #b30024;
        }
        p {
          text-align: center;
        }
        a {
          color: #ff0015;
          text-decoration: none;
        }
      </style>
</head>
<body>
    <h2>Inscription Étudiant</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">S'inscrire en tant qu'étudiant</button>
    </form>
    <p>Vous avez déjà un compte ? <a href="{% url 'accounts:login' %}">Se connecter</a></p>
</body>
</html>
